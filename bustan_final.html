        "الدُّعَاءُ فِي السَّجْدِ": "عَنْ أَبِي هُرَيْرَةَ رَضِيَ اللَّهُ عَنْهُ قَالَ: قَالَ رَسُولُ اللَّهِ ﷺ: «أَقْرَبُ مَا يَكُونُ الْعَبْدُ مِنْ رَبِّهِ وَهُوَ سَاجِدٌ، فَأَكْثِرُوا الدُّعَاءَ». (صحيح مسلم)",
        "الصَّدَقَةُ الْجَارِيَةُ": "عَنْ أَبِي هُرَيْرَةَ رَضِيَ اللَّهُ عَنْهُ قَالَ: قَالَ رَسُولُ اللَّهِ ﷺ: «إِذَا مَاتَ الْإِنْسَانُ انْقَطَعَ عَنْهُ عَمَلُهُ إِلَّا مِنْ ثَلَاثَةٍ: إِلَّا مِنْ صَدَقَةٍ جَارِيَةٍ، أَوْ عِلْمٍ يُنْتَفَعُ بِهِ، أَوْ وَلَدٍ صَالِحٍ يَدْعُو لَهُ». (صحيح مسلم)",
        "الْعِلْمُ الشَّرْعِيُّ فَرِيضَةٌ": "عَنْ أَنَسِ بْنِ مَالِكٍ رَضِيَ اللَّهُ عَنْهُ قَالَ: قَالَ رَسُولُ اللَّهِ ﷺ: «طَلَبُ الْعِلْمِ فَرِيضَةٌ عَلَى كُلِّ مُسْلِمٍ». (حسن، ابن ماجه)",
        "الْأَمْرُ بِالْمَعْرُوفِ وَالنَّهْيُ عَنِ الْمُنْكَرِ": "قَالَ تَعَالَى: ﴿وَلْتَكُنْ مِنْكُمْ أُمَّةٌ يَدْعُونَ إِلَى الْخَيْرِ وَيَأْمُرُونَ بِالْمَعْرُوفِ وَيَنْهَوْنَ عَنِ الْمُنْكَرِ﴾ [آل عمران: 104]. وَقَالَ ﷺ: «مَنْ رَأَى مِنْكُمْ مُنْكَرًا فَلْيُغَيِّرْهُ بِيَدِهِ...». (صحيح مسلم)",
        "الْإِحْسَانُ إِلَى الْجَارِ": "عَنْ أَبِي هُرَيْرَةَ رَضِيَ اللَّهُ عَنْهُ قَالَ: قَالَ رَسُولُ اللَّهِ ﷺ: «مَنْ كَانَ يُؤْمِنُ بِاللَّهِ وَالْيَوْمِ الْآخِرِ فَلَا يُؤْذِ جَارَهُ». (صحيح البخاري)",
        "الْعَفْوُ عَنِ النَّاسِ": "قَالَ تَعَالَى: ﴿وَلْيَعْفُوا وَلْيَصْفَحُوا أَلَا تُحِبُّونَ أَنْ يَغْفِرَ اللَّهُ لَكُمْ﴾ [النور: 22]. وَقَالَ ﷺ: «مَا زَادَ اللَّهُ عَبْدًا بِعَفْوٍ إِلَّا عِزًّا». (صحيح مسلم)",
        "الرِّفْقُ بِالْخَدَمِ": "عَنْ أَبِي هُرَيْرَةَ رَضِيَ اللَّهُ عَنْهُ أَنَّ رَسُولَ اللَّهِ ﷺ قَالَ: «إِذَا أَتَى أَحَدَكُمْ خَادِمُهُ بِطَعَامِهِ فَلْيُجْلِسْهُ مَعَهُ، فَإِنْ لَمْ يَفْعَلْ فَلْيُنَاوِلْهُ لُقْمَةً». (صحيح البخاري)",
        "حُسْنُ الظَّنِّ بِاللَّهِ": "عَنْ أَبِي هُرَيْرَةَ رَضِيَ اللَّهُ عَنْهُ قَالَ: قَالَ رَسُولُ اللَّهِ ﷺ: «يَقُولُ اللَّهُ تَعَالَى: أَنَا عِنْدَ ظَنِّ عَبْدِي بِي». (صحيح البخاري)",
        "التَّوَكُّلُ عَلَى اللَّهِ": "قَالَ تَعَالَى: ﴿وَمَنْ يَتَوَكَّلْ عَلَى اللَّهِ فَهُوَ حَسْبُهُ﴾ [الطلاق: 3]. وَقَالَ ﷺ: «لَوْ أَنَّكُمْ تَتَوَكَّلُونَ عَلَى اللَّهِ حَقَّ تَوَكُّلِهِ لَرَزَقَكُمْ كَمَا يَرْزُقُ الطَّيْرَ». (حسن، الترمذي)",
        "الْقَنَاعَةُ": "عَنْ عَبْدِ اللَّهِ بْنِ عَمْرٍو رَضِيَ اللَّهُ عَنْهُمَا أَنَّ رَسُولَ اللَّهِ ﷺ قَالَ: «قَدْ أَفْلَحَ مَنْ أَسْلَمَ وَرُزِقَ كَفَافًا وَقَنَّعَهُ اللَّهُ بِمَا آتَاهُ». (صحيح مسلم)",
        "الصَّبْرُ عَلَى الْبَلَاءِ": "عَنْ أَبِي هُرَيْرَةَ رَضِيَ اللَّهُ عَنْهُ قَالَ: قَالَ رَسُولُ اللَّهِ ﷺ: «مَا يُصِيبُ الْمُسْلِمَ مِنْ نَصَبٍ وَلَا وَصَبٍ وَلَا هَمٍّ وَلَا حُزْنٍ وَلَا أَذًى وَلَا غَمٍّ حَتَّى الشَّوْكَةِ يُشَاكُهَا إِلَّا كَفَّرَ اللَّهُ بِهَا مِنْ خَطَايَاهُ». (صحيح البخاري)",
        "الشُّكْرُ عَلَى النِّعَمِ": "قَالَ تَعَالَى: ﴿لَئِنْ شَكَرْتُمْ لَأَزِيدَنَّكُمْ﴾ [إبراهيم: 7]. وَقَالَ ﷺ: «أَحَبُّ الصَّلَاةِ إِلَى اللَّهِ صَلَاةُ دَاوُدَ، وَأَحَبُّ الصِّيَامِ إِلَى اللَّهِ صِيَامُ دَاوُدَ، كَانَ يَنَامُ نِصْفَ اللَّيْلِ وَيَقُومُ ثُلُثَهُ وَيَنَامُ سُدُسَهُ، وَيَصُومُ يَوْمًا وَيُفْطِرُ يَوْمًا». (متفق عليه)",
        "الْوَرَعُ وَاجْتِنَابُ الشُّبُهَاتِ": "عَنِ النُّعْمَانِ بْنِ بَشِيرٍ رَضِيَ اللَّهُ عَنْهُمَا قَالَ: سَمِعْتُ رَسُولَ اللَّهِ ﷺ يَقُولُ: «إِنَّ الْحَلَالَ بَيِّنٌ وَإِنَّ الْحَرَامَ بَيِّنٌ، وَبَيْنَهُمَا أُمُورٌ مُشْتَبِهَاتٌ لَا يَعْلَمُهُنَّ كَثِيرٌ مِنَ النَّاسِ، فَمَنِ اتَّقَى الشُّبُهَاتِ فَقَدِ اسْتَبْرَأَ لِدِينِهِ وَعِرْضِهِ». (متفق عليه)",
        "الْحَجُّ الْمَبْرُورُ": "عَنْ أَبِي هُرَيْرَةَ رَضِيَ اللَّهُ عَنْهُ قَالَ: سُئِلَ رَسُولُ اللَّهِ ﷺ: أَيُّ الْعَمَلِ أَفْضَلُ؟ قَالَ: «إِيمَانٌ بِاللَّهِ وَرَسُولِهِ». قِيلَ: ثُمَّ مَاذَا؟ قَالَ: «جِهَادٌ فِي سَبِيلِ اللَّهِ». قِيلَ: ثُمَّ مَاذَا؟ قَالَ: «حَجٌّ مَبْرُورٌ». (متفق عليه)",
        "الْعُمْرَةُ فِي رَمَضَانَ": "عَنِ ابْنِ عَبَّاسٍ رَضِيَ اللَّهُ عَنْهُمَا قَالَ: قَالَ رَسُولُ اللَّهِ ﷺ لِامْرَأَةٍ مِنَ الْأَنْصَارِ: «عُمْرَةٌ فِي رَمَضَانَ تَعْدِلُ حَجَّةً». (متفق عليه)",
        "صِلَةُ الْأَرْحَامِ": "عَنْ أَبِي أَيُّوبَ الْأَنْصَارِيِّ السَّابِقِ، وَعَنْ أَبِي هُرَيْرَةَ رَضِيَ اللَّهُ عَنْهُ قَالَ: قَالَ رَسُولُ اللَّهِ ﷺ: «مَنْ سَرَّهُ أَنْ يُبْسَطَ لَهُ فِي رِزْقِهِ وَيُنْسَأَ لَهُ فِي أَثَرِهِ فَلْيَصِلْ رَحِمَهُ». (صحيح البخاري)",
        "كَفَالَةُ الْيَتِيمِ": "عَنْ سَهْلِ بْنِ سَعْدٍ رَضِيَ اللَّهُ عَنْهُ قَالَ: قَالَ رَسُولُ اللَّهِ ﷺ: «أَنَا وَكَافِلُ الْيَتِيمِ فِي الْجَنَّةِ هَكَذَا». وَقَرَنَ بَيْنَ إِصْبَعَيْهِ. (صحيح البخاري)",
        "الْإِحْسَانُ إِلَى الْأَرْمَلَةِ": "عَنْ أَبِي هُرَيْرَةَ رَضِيَ اللَّهُ عَنْهُ قَالَ: قَالَ رَسُولُ اللَّهِ ﷺ: «السَّاعِي عَلَى الْأَرْمَلَةِ وَالْمِسْكِينِ كَالْمُجَاهِدِ فِي سَبِيلِ اللَّهِ». (متفق عليه)",
        "الْحِلْمُ وَالْأَنَاةُ": "عَنْ عَائِشَةَ رَضِيَ اللَّهُ عَنْهَا قَالَتْ: قَالَ رَسُولُ اللَّهِ ﷺ: «إِنَّ الرِّفْقَ لَا يَكُونُ فِي شَيْءٍ إِلَّا زَانَهُ، وَلَا يُنْزَعُ مِنْ شَيْءٍ إِلَّا شَانَهُ». (صحيح مسلم)",
        "الْأَمَانَةُ": "قَالَ تَعَالَى: ﴿إِنَّ اللَّهَ يَأْمُرُكُمْ أَنْ تُؤَدُّوا الْأَمَانَاتِ إِلَى أَهْلِهَا﴾ [النساء: 58]. وَقَالَ ﷺ: «آيَةُ الْمُنَافِقِ ثَلَاثٌ: إِذَا حَدَّثَ كَذَبَ، وَإِذَا وَعَدَ أَخْلَفَ، وَإِذَا اؤْتُمِنَ خَانَ». (متفق عليه)",
        "الْوَفَاءُ بِالْعُهُودِ": "قَالَ تَعَالَى: ﴿وَأَوْفُوا بِالْعَهْدِ إِنَّ الْعَهْدَ كَانَ مَسْئُولًا﴾ [الإسراء: 34]. وَعَنْ عَبْدِ اللَّهِ بْنِ عَمْرٍو رَضِيَ اللَّهُ عَنْهُمَا: أَنَّ رَسُولَ اللَّهِ ﷺ قَالَ: «أَرْبَعٌ مَنْ كُنَّ فِيهِ كَانَ مُنَافِقًا خَالِصًا...». الحديث وفيه: «إِذَا عَاهَدَ غَدَرَ». (متفق عليه)",
        "رَحْمَةُ الصِّغَارِ": "عَنْ أَبِي هُرَيْرَةَ رَضِيَ اللَّهُ عَنْهُ قَالَ: قَبَّلَ رَسُولُ اللَّهِ ﷺ الْحَسَنَ بْنَ عَلِيٍّ وَعِنْدَهُ الْأَقْرَعُ بْنُ حَابِسٍ، فَقَالَ: إِنَّ لِي عَشَرَةً مِنَ الْوَلَدِ مَا قَبَّلْتُ مِنْهُمْ أَحَدًا، فَقَالَ رَسُولُ اللَّهِ ﷺ: «مَنْ لَا يَرْحَمُ لَا يُرْحَمُ». (صحيح البخاري)",
        "إِجْلَالُ الْكِبَارِ": "عَنْ عَمْرِو بْنِ شُعَيْبٍ عَنْ أَبِيهِ عَنْ جَدِّهِ قَالَ: قَالَ رَسُولُ اللَّهِ ﷺ: «لَيْسَ مِنَّا مَنْ لَمْ يَرْحَمْ صَغِيرَنَا وَيَعْرِفْ حَقَّ كَبِيرِنَا». (حسن، أبو داود)",
        "الْحَيَاءُ مِنَ اللَّهِ": "عَنْ عَبْدِ اللَّهِ بْنِ مَسْعُودٍ رَضِيَ اللَّهُ عَنْهُ قَالَ: قَالَ رَسُولُ اللَّهِ ﷺ: «اسْتَحْيُوا مِنَ اللَّهِ حَقَّ الْحَيَاءِ». قَالَ: قُلْنَا: يَا رَسُولَ اللَّهِ، إِنَّا نَسْتَحِي، وَالْحَمْدُ لِلَّهِ، قَالَ: «لَيْسَ ذَاكَ، وَلَكِنَّ الِاسْتِحْيَاءَ مِنَ اللَّهِ حَقَّ الْحَيَاءِ...». (حسن، الترمذي)",
        "خَشْيَةُ اللَّهِ فِي السِّرِّ": "قَالَ تَعَالَى: ﴿إِنَّ الَّذِينَ يَخْشَوْنَ رَبَّهُمْ بِالْغَيْبِ لَهُمْ مَغْفِرَةٌ وَأَجْرٌ كَبِيرٌ﴾ [الملك: 12]. وَعَنْ أَبِي هُرَيْرَةَ قَالَ: قَالَ رَسُولُ اللَّهِ ﷺ: «سَبْعَةٌ يُظِلُّهُمُ اللَّهُ فِي ظِلِّهِ يَوْمَ لَا ظِلَّ إِلَّا ظِلُّهُ... رَجُلٌ تَصَدَّقَ بِصَدَقَةٍ فَأَخْفَاهَا حَتَّى لَا تَعْلَمَ شِمَالُهُ مَا تُنْفِقُ يَمِينُهُ». (متفق عليه)",
        "مُحَاسَبَةُ النَّفْسِ": "قَالَ تَعَالَى: ﴿يَا أَيُّهَا الَّذِينَ آمَنُوا اتَّقُوا اللَّهَ وَلْتَنْظُرْ نَفْسٌ مَا قَدَّمَتْ لِغَدٍ﴾ [الحشر: 18]. وَعَنْ عُمَرَ رَضِيَ اللَّهُ عَنْهُ قَالَ: «حَاسِبُوا أَنْفُسَكُمْ قَبْلَ أَنْ تُحَاسَبُوا». (حسن، الترمذي)",
        "الْإِكْثَارُ مِنَ الِاسْتِغْفَارِ": "قَالَ تَعَالَى: ﴿وَاسْتَغْفِرُوا اللَّهَ إِنَّ اللَّهَ غَفُورٌ رَحِيمٌ﴾ [المزمل: 20]. وَقَالَ ﷺ: «وَاللَّهِ إِنِّي لَأَسْتَغْفِرُ اللَّهَ وَأَتُوبُ إِلَيْهِ فِي الْيَوْمِ أَكْثَرَ مِنْ سَبْعِينَ مَرَّةً». (صحيح البخاري)",
        "فَضْلُ لَا إِلَهَ إِلَّا اللَّهُ": "عَنْ أَبِي هُرَيْرَةَ رَضِيَ اللَّهُ عَنْهُ قَالَ: قَالَ رَسُولُ اللَّهِ ﷺ: «أَفْضَلُ الذِّكْرِ لَا إِلَهَ إِلَّا اللَّهُ». (حسن، الترمذي)",
        "أَسْمَاءُ اللَّهِ الْحُسْنَى": "قَالَ تَعَالَى: ﴿وَلِلَّهِ الْأَسْمَاءُ الْحُسْنَى فَادْعُوهُ بِهَا﴾ [الأعراف: 180]. وَقَالَ ﷺ: «إِنَّ لِلَّهِ تِسْعَةً وَتِسْعِينَ اسْمًا، مَنْ أَحْصَاهَا دَخَلَ الْجَنَّةَ». (متفق عليه)",
        "دُعَاءُ الْكَرْبِ": "عَنْ عَبْدِ اللَّهِ بْنِ مَسْعُودٍ رَضِيَ اللَّهُ عَنْهُ قَالَ: قَالَ رَسُولُ اللَّهِ ﷺ: «مَا أَصَابَ عَبْدًا هَمٌّ وَلَا حُزْنٌ فَقَالَ: اللَّهُمَّ إِنِّي عَبْدُكَ، ابْنُ عَبْدِكَ، ابْنُ أَمَتِكَ، نَاصِيَتِي بِيَدِكَ... إِلَّا كَشَفَ اللَّهُ عَنْهُ هَمَّهُ». (حسن، ابن حبان)",
        "صَلَاةُ الضُّحَى": "عَنْ أَبِي هُرَيْرَةَ رَضِيَ اللَّهُ عَنْهُ قَالَ: أَوْصَانِي خَلِيلِي ﷺ بِثَلَاثٍ: «صِيَامِ ثَلَاثَةِ أَيَّامٍ مِنْ كُلِّ شَهْرٍ، وَرَكْعَتَيِ الضُّحَى، وَأَنْ أُوتِرَ قَبْلَ أَنْ أَنَامَ». (متفق عليه)",
        "صَلَاةُ التَّوْبَةِ": "عَنْ عَلِيِّ بْنِ أَبِي طَالِبٍ رَضِيَ اللَّهُ عَنْهُ قَالَ: كُنْتُ إِذَا سَمِعْتُ مِنْ رَسُولِ اللَّهِ ﷺ حَدِيثًا نَفَعَنِي اللَّهُ بِهِ، وَقَالَ: «مَا مِنْ عَبْدٍ يُذْنِبُ ذَنْبًا فَيَتَوَضَّأُ فَيُحْسِنُ الْوُضُوءَ ثُمَّ يُصَلِّي رَكْعَتَيْنِ ثُمَّ يَسْتَغْفِرُ اللَّهَ إِلَّا غَفَرَ لَهُ». (حسن، أبو داود)",
        "الْإِتْيَانُ بِالسُّنَنِ": "عَنْ أَبِي هُرَيْرَةَ رَضِيَ اللَّهُ عَنْهُ قَالَ: قَالَ رَسُولُ اللَّهِ ﷺ: «مَنْ تَمَسَّكَ بِسُنَّتِي عِنْدَ فَسَادِ أُمَّتِي فَلَهُ أَجْرُ شَهِيدٍ». (حسن، الطبراني)",
        "الْحِرْصُ عَلَى الْجَمَاعَةِ": "عَنِ ابْنِ عُمَرَ رَضِيَ اللَّهُ عَنْهُمَا أَنَّ رَسُولُ اللَّهِ ﷺ قَالَ: «صَلَاةُ الْجَمَاعَةِ تَفْضُلُ صَلَاةَ الْفَذِّ بِسَبْعٍ وَعِشْرِينَ دَرَجَةً». (متفق عليه)",
        "فَضْلُ الْعِلْمِ": "عَنْ أَبِي هُرَيْرَةَ رَضِيَ اللَّهُ عَنْهُ قَالَ: قَالَ رَسُولُ اللَّهِ ﷺ: «مَنْ سَلَكَ طَرِيقًا يَلْتَمِسُ فِيهِ عِلْمًا سَهَّلَ اللَّهُ لَهُ طَرِيقًا إِلَى الْجَنَّةِ». (صحيح مسلم)",
        "ذِكْرُ اللَّهِ فِي الْأَسْوَاقِ": "عَنْ عَبْدِ اللَّهِ بْنِ عُمَرَ رَضِيَ اللَّهُ عَنْهُمَا قَالَ: قَالَ رَسُولُ اللَّهِ ﷺ: «لَا يُجَالِسُ مَنْ يَذْكُرُ اللَّهَ إِلَّا وَفَدَ إِلَى اللَّهِ». (حسن، الحاكم)",
        "الْإِنْفَاقُ فِي سَبِيلِ اللَّهِ": "قَالَ تَعَالَى: ﴿مَثَلُ الَّذِينَ يُنْفِقُونَ أَمْوَالَهُمْ فِي سَبِيلِ اللَّهِ كَمَثَلِ حَبَّةٍ أَنْبَتَتْ سَبْعَ سَنَابِلَ﴾ [البقرة: 261]. وَقَالَ ﷺ: «مَا نَقَصَتْ صَدَقَةٌ مِنْ مَالٍ». (صحيح مسلم)",
        "الْحَجُّ وَالْعُمْرَةُ": "عَنْ أَبِي هُرَيْرَةَ رَضِيَ اللَّهُ عَنْهُ قَالَ: قَالَ رَسُولُ اللَّهِ ﷺ: «الْعُمْرَةُ إِلَى الْعُمْرَةِ كَفَّارَةٌ لِمَا بَيْنَهُمَا، وَالْحَجُّ الْمَبْرُورُ لَيْسَ لَهُ جَزَاءٌ إِلَّا الْجَنَّةُ». (متفق عليه)",
        "الْجِهَادُ بِالنَّفْسِ وَالْمَالِ": "قَالَ تَعَالَى: ﴿إِنَّ اللَّهَ اشْتَرَى مِنَ الْمُؤْمِنِينَ أَنْفُسَهُمْ وَأَمْوَالَهُمْ بِأَنَّ لَهُمُ الْجَنَّةَ﴾ [التوبة: 111]. وَقَالَ ﷺ: «أَفْضَلُ الْجِهَادِ كَلِمَةُ حَقٍّ عِنْدَ سُلْطَانٍ جَائِرٍ». (حسن، أبو داود)"
    };

    // دوال مساعدة
    function getRandomItem(arr, seed) {
        return arr[Math.abs(seed) % arr.length];
    }

    function getSource(category, seed) {
        const list = sources[category];
        const idx = Math.abs(seed) % list.length;
        const s = list[idx];
        return `<a href="${s.url}" target="_blank" rel="noopener noreferrer">${s.text}</a> (مصدر موثوق)`;
    }

            skills: [
                `امْنَحْ نَفْسَكَ 10 دَقَائِقَ الْيَوْمَ لِلتَّدَرُّبِ عَلَى هَذِهِ الْمَهَارَةِ، فَالْمُدَاوَمَةُ تُعْطِي الْإِتْقَانَ.`,
                `طَبِّقِ الْمَهَارَةَ فِي مَوْقِفٍ حَقِيقِيٍّ (عَمَلٍ أَوْ حِوَارٍ) وَسَجِّلْ مَا شَعَرْتَ بِهِ.`,
                `شَاهِدْ فِيدْيُوهَاتٍ تُعَلِّمُ هَذِهِ الْمَهَارَةَ، وَكَرِّرْ تَمْرِينًا وَاحِدًا عَلَى الأَقَلِّ.`,
                `اطْلُبْ مِنْ صَدِيقٍ أَنْ يُقَدِّمَ لَكَ تَغْذِيَةً رَاجِعَةً عَنْ أَدَائِكَ فِي هَذِهِ الْمَهَارَةِ.`
            ]
        };
        const list = templates[category];
        return getRandomItem(list, seed);
    }

    function generateFruit(category, topic, dayIndex, fruitIndex, categoriesMap) {
        const seed = dayIndex * 100 + fruitIndex * 31;
        const categoryId = categoriesMap[category];
        const icons = { soul: "🕌", mind: "📚", body: "🏃", money: "💎", skills: "⚡" };
        const names = { soul: "بُسْتَانُ الرُّوحِ", mind: "بُسْتَانُ العَقْلِ", body: "بُسْتَانُ الجَسَدِ", money: "بُسْتَانُ المَالِ", skills: "بُسْتَانُ المَهَارَاتِ" };
        const subtitles = { soul: "الرُّوح •", mind: "العَقْل •", body: "الجَسَد •", money: "المَال •", skills: "المَهَارَات •" };
        
        const titleBase = `الثَّمَرَةُ ${fruitIndex+1 === 1 ? "الأُولَى" : fruitIndex+1 === 2 ? "الثَّانِيَةُ" : fruitIndex+1 === 3 ? "الثَّالِثَةُ" : fruitIndex+1 === 4 ? "الرَّابِعَةُ" : "الخَامِسَةُ"}: ${names[category]} (${topic})`;
        
        return {
            title: titleBase,
            nass: generateNass(category, topic, seed),
            dalil: generateDalil(category, topic, seed+1),
            tashbeeh: generateTashbeeh(category, topic, seed+2),
            tatbeeq: generateTatbeeq(category, topic, seed+3),
            source: getSource(categoryId, seed+4),
            icon: icons[category],
            sub: `${subtitles[category]} ${topic}`
        };
    }

    // توليد 365 يومًا
    const TOTAL_DAYS = 365;
    const START_DATE = new Date(2026, 2, 24); // 24 مارس 2026

    const categoriesMap = { soul: "soul", mind: "mind", body: "body", money: "money", skills: "skills" };
    const categories = ["soul", "mind", "body", "money", "skills"];
    const topicsLists = { soul: soulTopics, mind: mindTopics, body: bodyTopics, money: moneyTopics, skills: skillsTopics };

    let orchardData = [];
    for (let day = 0; day < TOTAL_DAYS; day++) {
        const dayFruits = [];
        for (let i = 0; i < categories.length; i++) {
            const cat = categories[i];
            const list = topicsLists[cat];
            const prime = [211, 223, 227, 229, 233][i];
            const idx = (day * prime) % list.length;
            const topic = list[idx];
            const fruit = generateFruit(cat, topic, day, i, categoriesMap);
            dayFruits.push(fruit);
        }
        orchardData.push(dayFruits);
    }

    // ======================= عرض الصفحة والتنقل =======================
    let currentDay = 0;

    function getCurrentDayFromRealDate() {
        const today = new Date(); today.setHours(0,0,0,0);
        let diff = Math.floor((today - START_DATE) / (1000*60*60*24));
        if (diff < 0) diff = 0;
        if (diff >= TOTAL_DAYS) diff = TOTAL_DAYS - 1;
        return diff;
    }

    function updateURL(day) { window.history.pushState({}, '', `?day=${day+1}`); }
    function getDayFromURL() {
        const params = new URLSearchParams(window.location.search);
        const d = parseInt(params.get('day'));
        if (!isNaN(d) && d>=1 && d<=TOTAL_DAYS) return d-1;
        return getCurrentDayFromRealDate();
    }

    function buildArchive() {
        const select = document.getElementById('archiveSelect');
        select.innerHTML = '';
        for (let i=0; i<TOTAL_DAYS; i++) {
            const opt = document.createElement('option');
            opt.value = i;
            opt.textContent = `اليوم ${i+1}`;
            select.appendChild(opt);
        }
        select.addEventListener('change', (e) => {
            const newDay = parseInt(e.target.value);
            if (!isNaN(newDay) && newDay !== currentDay) {
                currentDay = newDay;
                updateURL(currentDay);
                renderDay();
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }
        });
    }

    function setDayFromDatePicker() {
        const selected = new Date(document.getElementById('datePicker').value);
        if (isNaN(selected)) return;
        selected.setHours(0,0,0,0);
        const diff = Math.floor((selected - START_DATE) / (1000*60*60*24));
        if (diff >= 0 && diff < TOTAL_DAYS) {
            currentDay = diff;
            updateURL(currentDay);
            renderDay();
        } else { showToast("⚠️ التاريخ خارج النطاق (24 مارس 2026 - 23 مارس 2027)"); }
    }

    function updateDatePicker() {
        const targetDate = new Date(START_DATE);
        targetDate.setDate(START_DATE.getDate() + currentDay);
        document.getElementById('datePicker').value = targetDate.toISOString().split('T')[0];
    }

    function renderDay() {
        const fruits = orchardData[currentDay];
        if (!fruits) return;
        document.getElementById('dayCounter').innerHTML = `🍃 اليوم ${currentDay+1} من ${TOTAL_DAYS} 🍃`;
        const targetDate = new Date(START_DATE);
        targetDate.setDate(START_DATE.getDate() + currentDay);
        document.getElementById('gregDate').innerHTML = `📅 ${targetDate.toLocaleDateString('ar-EG', { year:'numeric', month:'long', day:'numeric' })}`;

        let html = '';
        const icons = ['🕌', '📚', '🏃', '💎', '⚡'];
        for (let i=0; i<fruits.length; i++) {
            const f = fruits[i];
            html += `
                <div class="fruit-card" data-fruit-index="${i}">
                    <div class="card-header">
                        <div class="title-area">
                            <span class="fruit-icon">${icons[i]}</span>
                            <span class="fruit-title">${f.title}</span>
                            <span class="subtitle">${f.sub}</span>
                        </div>
                        <div class="share-actions">
                            <button class="share-img-btn" data-day="${currentDay}" data-fruit="${i}">📸 مشاركة كصورة</button>
                            <button class="share-btn" data-day="${currentDay}" data-fruit="${i}">📝 مشاركة كنص</button>
                        </div>
                    </div>
                    <div class="content">
                        <div class="section"><strong>📖 النَّصُّ الَّذِي نَقُولُهُ:</strong><p>${f.nass}</p></div>
                        <div class="section"><strong>📚 الدَّلِيلُ:</strong><p>${f.dalil}</p></div>
                        <div class="section"><strong>🔍 التَّشْبِيهُ:</strong><p>${f.tashbeeh}</p></div>
                        <div class="section"><strong>⚙️ التَّطْبِيقُ العَمَلِيُّ:</strong><p>${f.tatbeeq}</p></div>
                        <div class="source">📎 المَصْدَرُ المَفْتُوحُ: ${f.source}</div>
                    </div>
                </div>
            `;
        }
        document.getElementById('fruitsContainer').innerHTML = html;
        
        attachShareEvents();
        
        document.getElementById('prevDayBtn').disabled = (currentDay === 0);
        document.getElementById('nextDayBtn').disabled = (currentDay === TOTAL_DAYS-1);
        document.getElementById('archiveSelect').value = currentDay;
        updateDatePicker();
    }

    function attachShareEvents() {
        document.querySelectorAll('.share-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                const day = parseInt(btn.dataset.day);
                const fruit = parseInt(btn.dataset.fruit);
                shareFruitAsText(day, fruit);
            });
        });
        document.querySelectorAll('.share-img-btn').forEach(btn => {
            btn.addEventListener('click', async (e) => {
                e.stopPropagation();
                const day = parseInt(btn.dataset.day);
                const fruit = parseInt(btn.dataset.fruit);
                await shareFruitAsImage(day, fruit);
            });
        });
    }

    function generateFruitText(day, fruitIdx) {
        const fruit = orchardData[day][fruitIdx];
        const srcText = fruit.source.replace(/<[^>]*>/g, '');
        return `${fruit.title}\n\n**النَّصُّ الَّذِي نَقُولُهُ:**\n${fruit.nass}\n\n**الدَّلِيلُ:**\n${fruit.dalil}\n\n**التَّشْبِيهُ:**\n${fruit.tashbeeh}\n\n**التَّطْبِيقُ العَمَلِيُّ:**\n${fruit.tatbeeq}\n\n**المَصْدَرُ المَفْتُوحُ:**\n${srcText}\n\n---\nبستان الحياة - اليوم ${day+1}`;
    }

    async function shareFruitAsText(day, fruitIdx) {
        const text = generateFruitText(day, fruitIdx);
        if (navigator.share) {
            try { await navigator.share({ title: `🍃 ثمرة اليوم`, text }); showToast("✅ تمت المشاركة"); }
            catch(e) { if(e.name !== 'AbortError') copyToClipboard(text); }
        } else copyToClipboard(text);
    }

    async function shareFruitAsImage(day, fruitIdx) {
        const cards = document.querySelectorAll('.fruit-card');
        let target = null;
        for (let i=0; i<cards.length; i++) {
            if (parseInt(cards[i].getAttribute('data-fruit-index')) === fruitIdx) {
                target = cards[i];
                break;
            }
        }
        if (!target) { showToast("⚠️ لم نجد البطاقة"); return; }
        const btn = document.querySelector(`.share-img-btn[data-day='${day}'][data-fruit='${fruitIdx}']`);
        if(btn) btn.textContent = "⏳ جاري...";
        try {
            const originalTransform = target.style.transform;
            target.style.transform = 'none';
            const canvas = await html2canvas(target, { scale: 2, backgroundColor: '#fffef7' });
            const imgData = canvas.toDataURL('image/png');
            if (navigator.share && navigator.canShare && navigator.canShare({ files: [] })) {
                const blob = await (await fetch(imgData)).blob();
                const file = new File([blob], `ثمرة.png`, { type: 'image/png' });
                await navigator.share({ title: "🍃 بستان الحياة", files: [file] });
                showToast("✅ تمت المشاركة");
            } else {
                const w = window.open();
                w.document.write(`<html dir="rtl"><body style="display:flex; justify-content:center;"><img src="${imgData}" style="max-width:100%; border-radius:20px;" /></body></html>`);
                showToast("📸 تم إنشاء الصورة");
            }
            target.style.transform = originalTransform;
        } catch(e) { showToast("❌ فشل"); target.style.transform = ''; }
        finally { if(btn) btn.textContent = "📸 مشاركة كصورة"; }
    }

    function copyToClipboard(text) { navigator.clipboard.writeText(text).then(() => showToast("✅ تم نسخ النص")).catch(() => showToast("❌ فشل")); }
    function showToast(msg) { const t = document.getElementById('toastMsg'); t.textContent = msg; t.style.opacity = '1'; setTimeout(() => t.style.opacity = '0', 2500); }

    function nextDay() { if(currentDay < TOTAL_DAYS-1) { currentDay++; updateURL(currentDay); renderDay(); window.scrollTo({ top:0, behavior:'smooth' }); } }
    function prevDay() { if(currentDay > 0) { currentDay--; updateURL(currentDay); renderDay(); window.scrollTo({ top:0, behavior:'smooth' }); } }

    function init() {
        buildArchive();
        currentDay = getDayFromURL();
        renderDay();
        updateURL(currentDay);
        document.getElementById('prevDayBtn').addEventListener('click', prevDay);
        document.getElementById('nextDayBtn').addEventListener('click', nextDay);
        document.getElementById('datePicker').addEventListener('change', setDayFromDatePicker);
        window.addEventListener('popstate', () => {
            currentDay = getDayFromURL();
            renderDay();
        });
    }
    init();
</script>
</body>
</html>
